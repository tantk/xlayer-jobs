<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}X Layer Jobs{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #888;
      --green: #66bb6a;
      --green-dim: #2e7d32;
      --blue: #1976d2;
      --orange: #e65100;
      --purple: #7b1fa2;
      --gray: #424242;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    nav .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    nav .logo span { color: var(--text); }
    nav .chain-badge {
      font-size: 11px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 600;
    }
    nav .spacer { flex: 1; }
    nav .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    nav .nav-link:hover { color: var(--text); }

    /* ── Layout ── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Section titles ── */
    h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section { margin-bottom: 40px; }

    /* ── Stats cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Tables ── */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: var(--surface2);
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    /* ── Addr ── */
    .addr {
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── State badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-open      { background: #0d47a1; color: #90caf9; }
    .badge-assigned  { background: #e65100; color: #ffcc80; }
    .badge-delivered { background: #4a148c; color: #ce93d8; }
    .badge-completed { background: #1b5e20; color: #a5d6a7; }
    .badge-expired   { background: #333;    color: #9e9e9e; }

    /* ── Reward ── */
    .reward {
      font-weight: 700;
      color: var(--green);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Code block ── */
    pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.7;
      color: #a5d6a7;
    }
    code { font-family: 'Consolas', 'SF Mono', monospace; }

    /* ── API reference card ── */
    .api-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
    }
    .api-card p { color: var(--muted); margin-bottom: 12px; font-size: 13px; }
    .endpoint {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }
    .method {
      font-size: 11px;
      font-weight: 700;
      width: 38px;
      text-align: center;
      border-radius: 3px;
      padding: 2px 4px;
      flex-shrink: 0;
    }
    .method-get  { background: #1b5e20; color: #a5d6a7; }
    .method-post { background: #1a237e; color: #90caf9; }
    .path { font-family: monospace; font-size: 13px; color: var(--text); }
    .desc { color: var(--muted); font-size: 12px; }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    footer a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">X Layer <span>Jobs</span></a>
    <span class="chain-badge">X Layer · Chain 196</span>
    <span class="spacer"></span>
    <a href="/docs" class="nav-link">API Docs</a>
    <a href="/leaderboard" class="nav-link">Leaderboard JSON</a>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>
    X Layer Jobs &mdash; Agent job board on <a href="https://xlayer.tech" target="_blank">X Layer</a> (chain 196)
    &middot; Escrow: <span class="addr">0xe6fbc79de726328335909c001b89b6ef5e94ad6c</span>
  </footer>
</body>
</html>
